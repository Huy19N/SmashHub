name: ci/cd SmashHub

on:
  push:
    branches:
    - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get source
        uses: actions/checkout@v6

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./BESmashClub
          file: ./BESmashClub/Dockerfile
          push: true
          tags: |
            tadminm/smashhub:latest
            tadminm/smashhub:${{ steps.vars.outputs.sha_short }}

      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_ACCESS_TOKEN: ${{ secrets.DOCKER_ACCESS_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DOCKER_USERNAME,DOCKER_ACCESS_TOKEN
          script: |
            # login Docker Hub on server (private repo)
            echo "$DOCKER_ACCESS_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin

            docker pull tadminm/smashhub:latest

            # delete old container
            docker stop smashhub_api || true
            docker rm smashhub_api || true

            # create network if not exists
            docker network create smashhub_net || true

            # run api with override environment variables
            docker run -d -p 5000:8080 \
              --name smashhub_api \
              --network smashhub_net \
              --restart always \
              -e ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION_STRING }}" \
              -e JwtSettings__Secret="${{ secrets.JWT_SECRET }}" \
              -e EmailSettings__AppPassword="${{ secrets.EMAIL_APP_PASSWORD }}" \
              -e PayOSSettings__ClientId="${{ secrets.PAYOS_CLIENT_ID }}" \
              -e PayOSSettings__ApiKey="${{ secrets.PAYOS_API_KEY }}" \
              -e PayOSSettings__ChecksumKey="${{ secrets.PAYOS_CHECKSUM_KEY }}" \
              tadminm/smashhub:latest

            # delete old image
            docker image prune -f
