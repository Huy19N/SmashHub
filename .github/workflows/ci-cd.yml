name: ci/cd SmashHub

on:
  push:
    branches:
    - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get source
        uses: actions/checkout@v6

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./BESmashClub
          file: ./BESmashClub/Dockerfile
          push: true
          tags: |
            tadminm/smashhub:latest
            tadminm/smashhub:${{ steps.vars.outputs.sha_short }}

      - name: Copy docker-compose via scp
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "./BESmashClub/docker-compose.yml"
          target: "~/app/SmashClub"
          strip_components: 2

      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_ACCESS_TOKEN: ${{ secrets.DOCKER_ACCESS_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DOCKER_USERNAME,DOCKER_ACCESS_TOKEN
          script: |
            cd ~/app/SmashClub
            
            # login Docker Hub on server (private repo)
            echo "$DOCKER_ACCESS_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
            
            # Generate .env file
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > .env
            echo "EMAIL_APP_PASSWORD=${{ secrets.EMAIL_APP_PASSWORD }}" >> .env
            echo "PAYOS_CLIENT_ID=${{ secrets.PAYOS_CLIENT_ID }}" >> .env
            echo "PAYOS_API_KEY=${{ secrets.PAYOS_API_KEY }}" >> .env
            echo "PAYOS_CHECKSUM_KEY=${{ secrets.PAYOS_CHECKSUM_KEY }}" >> .env

            docker compose pull
            docker compose up -d

            # delete old image
            docker image prune -f
